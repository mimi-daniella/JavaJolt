<div th:fragment="cards">
  <section class="mx-auto mt-16 max-w-6xl px-6" data-aos="fade-up" data-aos-duration="1000">
    <div class="grid gap-6 md:grid-cols-3">
      <div class="rounded-[2rem] border-4 border-[var(--espresso)] bg-white p-6 text-center shadow-[6px_6px_0px_var(--yellow)] transition hover:translate-y-1 hover:shadow-none">
        <img th:src="@{/images/quiz.png}" alt="Quiz doodle" class="mx-auto h-28 w-28 object-contain">
        <p class="mt-4 text-xl font-bold text-[var(--espresso)]">Interactive Quests</p>
        <p class="mt-2 text-sm text-[var(--light-text)]">Play Java quizzes that feel more like battles than boring tests.</p>
      </div>

      <div class="rounded-[2rem] border-4 border-[var(--espresso)] bg-white p-6 text-center shadow-[6px_6px_0px_var(--light-brown)] transition hover:translate-y-1 hover:shadow-none">
        <img th:src="@{/images/graph.png}" alt="Progress doodle" class="mx-auto h-28 w-28 object-contain">
        <p class="mt-4 text-xl font-bold text-[var(--espresso)]">Track Your Growth</p>
        <p class="mt-2 text-sm text-[var(--light-text)]">Follow your scores, momentum, and improvement as you level up.</p>
      </div>

      <div class="rounded-[2rem] border-4 border-[var(--espresso)] bg-white p-6 text-center shadow-[6px_6px_0px_var(--yellow)] transition hover:translate-y-1 hover:shadow-none">
        <img th:src="@{/images/earn.png}" alt="Rewards doodle" class="mx-auto h-28 w-28 object-contain">
        <p class="mt-4 text-xl font-bold text-[var(--espresso)]">Rewards & Ranks</p>
        <p class="mt-2 text-sm text-[var(--light-text)]">Earn XP, protect your streak, and rise through the JavaJolt ranks.</p>
      </div>
    </div>
  </section>
</div>
