<logos th:fragment="logos">
  <section class="mx-auto max-w-6xl px-6 pb-6">
    <div class="rounded-[2rem] border-4 border-[var(--espresso)] bg-white py-8 shadow-[6px_6px_0px_var(--light-brown)] overflow-hidden">
      <div class="flex animate-marquee-smooth whitespace-nowrap">
        <div class="flex items-center" th:each="repeat : ${#numbers.sequence(1,2)}">
          <div class="w-52 sm:w-64 flex justify-center px-4">
            <img th:src="@{/images/wthreeschools.svg}" alt="W3Schools" class="h-10 sm:h-12 hover:scale-110 transition-transform duration-300" />
          </div>
          <div class="w-52 sm:w-64 flex justify-center px-4">
            <img th:src="@{/images/geeks.svg}" alt="GeeksForGeeks" class="h-10 sm:h-12 hover:scale-110 transition-transform duration-300" />
          </div>
          <div class="w-52 sm:w-64 flex justify-center px-4">
            <img th:src="@{/images/hacker_rank.svg}" alt="HackerRank" class="h-10 sm:h-12 hover:scale-110 transition-transform duration-300" />
          </div>
          <div class="w-52 sm:w-64 flex justify-center px-4">
            <img th:src="@{/images/tut.svg}" alt="TutorialsPoint" class="h-10 sm:h-12 hover:scale-110 transition-transform duration-300" />
          </div>
        </div>
      </div>
    </div>
  </section>

  <style>
    @keyframes marquee-smooth {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    .animate-marquee-smooth {
      animation: marquee-smooth 14s linear infinite;
      display: flex;
      width: max-content;
    }

    .animate-marquee-smooth:hover {
      animation-play-state: paused;
    }
  </style>
</logos>
