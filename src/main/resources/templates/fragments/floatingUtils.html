	<script>

		let soundEnabled = false;

		function toggleSound() {
			const audio = document.getElementById("themeMusic");
			const soundOnBtn = document.getElementById("sound-max");
			const soundOffBtn = document.getElementById("sound-mute-alt");

			soundEnabled = !soundEnabled;
			localStorage.setItem("soundEnabled", soundEnabled);

			if (soundEnabled) {
				audio.play();
				soundOffBtn.classList.add("hidden");
				soundOnBtn.classList.remove("hidden");

			} else {
				audio.pause();
				localStorage.setItem("soundPosition", audio.currentTime);
				soundOnBtn.classList.add("hidden");
				soundOffBtn.classList.remove("hidden");
			}
		}

		document.addEventListener("DOMContentLoaded", () => {
			const audio = document.getElementById("themeMusic");
			const soundOnBtn = document.getElementById("sound-max");
			const soundOffBtn = document.getElementById("sound-mute-alt");

			const savedState = localStorage.getItem("soundEnabled");
			const savedPosition = localStorage.getItem("soundPosition");

			if (savedState === "true") {
				soundEnabled = true;

				if (savedPosition) {
					audio.currentTime = parseFloat(savedPosition);
				}

				audio.play();
				soundOffBtn.classList.add("hidden");
				soundOnBtn.classList.remove("hidden");
			} else {
				soundEnabled = false;
				audio.pause();
				soundOnBtn.classList.add("hidden");
				soundOffBtn.classList.remove("hidden");
			}
		});

		//keep updating while playing
		audio.addEventListener("timeupdate", () => {
			if (soundEnabled) {
				localStorage.setItem("soundPosition", audio.currentTime);
			}
		});


	</script>
