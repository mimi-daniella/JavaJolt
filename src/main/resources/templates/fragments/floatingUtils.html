<div th:fragment="utils">
  <audio th:src="@{/sounds/theme_music.mp3}" loop id="jj-theme-audio" preload="auto"></audio>
  <audio th:src="@{/sounds/button_press.mp3}" id="jj-button-audio" preload="auto"></audio>
  <audio th:src="@{/sounds/correct.mp3}" id="jj-praise-audio" preload="auto"></audio>
  <audio th:src="@{/sounds/game_successful.mp3}" id="jj-victory-audio" preload="auto"></audio>
  <audio th:src="@{/sounds/wrong.mp3}" id="jj-warning-audio" preload="auto"></audio>
  <audio th:src="@{/sounds/timer.mp3}" id="jj-timer-audio" preload="auto"></audio>

  <div class="fixed bottom-6 right-4 flex flex-col gap-3 z-50">
    <button id="jj-theme-toggle" type="button" class="rounded-2xl border-4 border-[var(--espresso)] bg-white px-4 py-3 text-xs font-bold text-[var(--espresso)] shadow-[4px_4px_0px_var(--yellow)] transition hover:translate-y-1 hover:shadow-none">
      Music: Off
    </button>
    <button id="jj-effects-toggle" type="button" class="rounded-2xl border-4 border-[var(--espresso)] bg-[var(--yellow)] px-4 py-3 text-xs font-bold text-[var(--espresso)] shadow-[4px_4px_0px_var(--light-brown)] transition hover:translate-y-1 hover:shadow-none">
      Effects: On
    </button>
    <a th:href="@{/dashboard/settings}" class="rounded-2xl border-4 border-[var(--espresso)] bg-[var(--espresso)] px-4 py-3 text-center text-xs font-bold text-white shadow-[4px_4px_0px_var(--light-brown)] transition hover:translate-y-1 hover:shadow-none">
      Settings
    </a>
  </div>

  <script>
    (function () {
      if (window.JavaJoltAudio) {
        return;
      }

      const STORAGE = {
        theme: "javajolt.theme.enabled",
        effects: "javajolt.effects.enabled",
        position: "javajolt.theme.position"
      };

      const state = {
        themeEnabled: localStorage.getItem(STORAGE.theme) === "true",
        effectsEnabled: localStorage.getItem(STORAGE.effects) !== "false",
        unlocked: false
      };

      const ids = {
        theme: "jj-theme-audio",
        button: "jj-button-audio",
        praise: "jj-praise-audio",
        victory: "jj-victory-audio",
        warning: "jj-warning-audio",
        timer: "jj-timer-audio"
      };

      function get(id) {
        return document.getElementById(id);
      }

      function updateButtons() {
        const themeBtn = document.getElementById("jj-theme-toggle");
        const effectsBtn = document.getElementById("jj-effects-toggle");
        if (themeBtn) themeBtn.textContent = `Music: ${state.themeEnabled ? "On" : "Off"}`;
        if (effectsBtn) effectsBtn.textContent = `Effects: ${state.effectsEnabled ? "On" : "Off"}`;
      }

      function unlockAudio() {
        if (state.unlocked) return;
        state.unlocked = true;
        const themeAudio = get(ids.theme);
        if (!themeAudio) return;
        const savedPosition = localStorage.getItem(STORAGE.position);
        if (savedPosition) {
          themeAudio.currentTime = parseFloat(savedPosition);
        }
        if (state.themeEnabled) {
          themeAudio.play().catch(() => {});
        }
      }

      function safePlay(audio) {
        if (!audio) return;
        audio.currentTime = 0;
        audio.play().catch(() => {});
      }

      function toggleThemeMusic(forceValue) {
        state.themeEnabled = typeof forceValue === "boolean" ? forceValue : !state.themeEnabled;
        localStorage.setItem(STORAGE.theme, String(state.themeEnabled));
        const themeAudio = get(ids.theme);
        if (themeAudio) {
          if (state.themeEnabled && state.unlocked) {
            themeAudio.play().catch(() => {});
          } else {
            localStorage.setItem(STORAGE.position, String(themeAudio.currentTime || 0));
            themeAudio.pause();
          }
        }
        updateButtons();
      }

      function toggleSoundEffects(forceValue) {
        state.effectsEnabled = typeof forceValue === "boolean" ? forceValue : !state.effectsEnabled;
        localStorage.setItem(STORAGE.effects, String(state.effectsEnabled));
        updateButtons();
      }

      function playEffect(type) {
        if (!state.effectsEnabled) return;
        unlockAudio();
        const map = {
          button: ids.button,
          praise: ids.praise,
          victory: ids.victory,
          warning: ids.warning,
          timer: ids.timer
        };
        safePlay(get(map[type] || ids.button));
      }

      function playResultTier(tier) {
        if (tier === "victory") {
          playEffect("victory");
          return;
        }
        if (tier === "praise") {
          playEffect("praise");
          return;
        }
        playEffect("warning");
      }

      document.addEventListener("DOMContentLoaded", () => {
        updateButtons();
        const themeBtn = document.getElementById("jj-theme-toggle");
        const effectsBtn = document.getElementById("jj-effects-toggle");
        const themeAudio = get(ids.theme);

        themeBtn?.addEventListener("click", () => {
          unlockAudio();
          toggleThemeMusic();
        });

        effectsBtn?.addEventListener("click", () => {
          unlockAudio();
          toggleSoundEffects();
          playEffect("button");
        });

        themeAudio?.addEventListener("timeupdate", () => {
          if (state.themeEnabled) {
            localStorage.setItem(STORAGE.position, String(themeAudio.currentTime));
          }
        });

        document.addEventListener("pointerdown", unlockAudio, { once: true });

        document.querySelectorAll("a, button").forEach(element => {
          if (element.id === "jj-theme-toggle" || element.id === "jj-effects-toggle") return;
          element.addEventListener("click", () => {
            if (state.effectsEnabled) {
              playEffect("button");
            }
          });
        });
      });

      window.JavaJoltAudio = {
        unlockAudio,
        toggleThemeMusic,
        toggleSoundEffects,
        playEffect,
        playResultTier,
        isEffectsEnabled: () => state.effectsEnabled,
        isThemeEnabled: () => state.themeEnabled
      };
    })();
  </script>
</div>
