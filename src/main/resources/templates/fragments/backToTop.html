<div th:fragment="backToTop">
  <button id="back-to-top"
          class="fixed bottom-5 right-5 hidden bg-[var(--espresso)] text-white font-bold px-4 py-3 rounded-full shadow-[4px_4px_0px_var(--yellow)] transition-all duration-300 ease-in-out hover:translate-y-1 hover:shadow-none z-30">
    ↑ Top
  </button>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const backToTopBtn = document.getElementById("back-to-top");
      if (!backToTopBtn) return;

      window.addEventListener("scroll", () => {
        backToTopBtn.classList.toggle("hidden", window.scrollY <= 220);
      });

      backToTopBtn.addEventListener("click", () => {
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });
  </script>
</div>
