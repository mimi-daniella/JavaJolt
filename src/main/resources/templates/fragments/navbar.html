<nav th:fragment="navbar" class="sticky top-0 z-50">
  <div class="border-b-4 border-[var(--espresso)] bg-[var(--cream)]/95 backdrop-blur-sm shadow-[0_6px_0_rgba(178,57,24,0.08)]">
    <div class="mx-auto max-w-screen-xl px-4 sm:px-6 lg:px-8">
      <div class="flex min-h-[82px] items-center justify-between gap-4 py-3">
        <a class="block shrink-0" th:href="@{/}">
          <img th:src="@{/images/fullLogo.png}" class="h-14 w-auto sm:h-16" alt="JavaJolt Logo">
        </a>

        <div class="hidden md:flex md:flex-1 md:items-center md:justify-between md:gap-8">
          <ul class="flex items-center gap-6 lg:gap-8 text-base lg:text-lg font-bold text-[var(--espresso)]">
            <li><a class="nav-link" th:href="@{/}">Home</a></li>
            <li><a class="nav-link" th:href="@{/public/about}">About</a></li>
            <li><a class="nav-link" th:href="@{/public/contact}">Contact</a></li>
            <li><a class="nav-link" th:href="@{/quizzes}">Play</a></li>
            <li th:if="${loggedIn}"><a class="nav-link" th:href="@{/dashboard}">Dashboard</a></li>
          </ul>

          <div class="flex items-center gap-3">
            <div th:if="${loggedIn}" class="hidden lg:flex items-center gap-3 rounded-2xl border-4 border-[var(--espresso)] bg-white px-4 py-2 shadow-[4px_4px_0px_var(--yellow)]">
              <img th:src="@{${currentUserAvatarPath}}" alt="Player Avatar" class="h-10 w-10 rounded-full object-cover border-2 border-[var(--espresso)]">
              <div class="text-sm font-bold text-[var(--espresso)]">
                Player
                <span th:text="${currentUserFirstName}">Hero</span>
              </div>
            </div>
            <a th:unless="${loggedIn}" class="rounded-2xl border-4 border-[var(--espresso)] bg-white px-5 py-2.5 text-sm font-bold text-[var(--espresso)] shadow-[4px_4px_0px_var(--yellow)] transition hover:translate-y-1 hover:shadow-none" th:href="@{/auth/login}">Login</a>
            <a th:unless="${loggedIn}" class="rounded-2xl border-4 border-[var(--espresso)] bg-[var(--espresso)] px-5 py-2.5 text-sm font-bold text-white shadow-[4px_4px_0px_var(--light-brown)] transition hover:translate-y-1 hover:shadow-none" th:href="@{/auth/register}">Register</a>
            <form th:if="${loggedIn}" th:action="@{/logout}" method="post" class="m-0">
              <button class="rounded-2xl border-4 border-[var(--espresso)] bg-[var(--yellow)] px-5 py-2.5 text-sm font-bold text-[var(--espresso)] shadow-[4px_4px_0px_var(--light-brown)] transition hover:translate-y-1 hover:shadow-none">
                Logout
              </button>
            </form>
          </div>
        </div>

        <div class="block md:hidden">
          <button id="menu-btn" type="button" class="rounded-xl border-2 border-[var(--espresso)] bg-white p-2 text-[var(--espresso)] shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="mobile-menu" class="fixed top-0 right-0 h-full w-72 max-w-[86vw] border-l-4 border-[var(--espresso)] bg-[var(--cream)] shadow-2xl transform translate-x-full transition-transform duration-300 ease-in-out md:hidden z-50">
    <div class="flex items-center justify-between border-b-2 border-[var(--espresso)] px-5 py-4">
      <span class="font-bold text-xl text-[var(--espresso)]">Menu</span>
      <button id="close-btn" type="button" class="rounded-xl border-2 border-[var(--espresso)] bg-white p-2 text-[var(--espresso)]">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div th:if="${loggedIn}" class="px-6 pt-5">
      <div class="flex items-center gap-3 rounded-2xl border-4 border-[var(--espresso)] bg-white px-4 py-3 shadow-[4px_4px_0px_var(--yellow)]">
        <img th:src="@{${currentUserAvatarPath}}" alt="Player Avatar" class="h-12 w-12 rounded-full object-cover border-2 border-[var(--espresso)]">
        <div class="text-sm font-bold text-[var(--espresso)]">
          Signed in as
          <span th:text="${currentUserFirstName}">Hero</span>
        </div>
      </div>
    </div>

    <ul class="flex flex-col gap-4 px-6 py-6 text-lg font-bold text-[var(--espresso)]">
      <li><a class="mobile-nav block rounded-xl border-2 border-transparent px-4 py-3 hover:border-[var(--espresso)] hover:bg-white" th:href="@{/}">Home</a></li>
      <li><a class="mobile-nav block rounded-xl border-2 border-transparent px-4 py-3 hover:border-[var(--espresso)] hover:bg-white" th:href="@{/public/about}">About</a></li>
      <li><a class="mobile-nav block rounded-xl border-2 border-transparent px-4 py-3 hover:border-[var(--espresso)] hover:bg-white" th:href="@{/quizzes}">Play</a></li>
      <li><a class="mobile-nav block rounded-xl border-2 border-transparent px-4 py-3 hover:border-[var(--espresso)] hover:bg-white" th:href="@{/public/contact}">Contact</a></li>
      <li th:if="${loggedIn}"><a class="mobile-nav block rounded-xl border-2 border-transparent px-4 py-3 hover:border-[var(--espresso)] hover:bg-white" th:href="@{/dashboard}">Dashboard</a></li>
      <li th:unless="${loggedIn}"><a class="mobile-nav block rounded-xl border-2 border-transparent px-4 py-3 hover:border-[var(--espresso)] hover:bg-white" th:href="@{/auth/login}">Login</a></li>
    </ul>

    <div class="px-6 pb-6 space-y-3">
      <a th:unless="${loggedIn}" class="mobile-nav block rounded-2xl border-4 border-[var(--espresso)] bg-[var(--espresso)] px-5 py-3 text-center text-sm font-bold text-white shadow-[4px_4px_0px_var(--light-brown)]" th:href="@{/auth/register}">Register</a>
      <form th:if="${loggedIn}" th:action="@{/logout}" method="post">
        <button class="w-full rounded-2xl border-4 border-[var(--espresso)] bg-[var(--yellow)] px-5 py-3 text-sm font-bold text-[var(--espresso)] shadow-[4px_4px_0px_var(--light-brown)]">
          Logout
        </button>
      </form>
    </div>
  </div>

  <div id="backdrop" class="fixed inset-0 bg-black/50 hidden md:hidden z-40"></div>

  <style>
    .nav-link {
      position: relative;
      transition: color 0.2s ease;
    }

    .nav-link::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -0.45rem;
      width: 100%;
      height: 0.25rem;
      border-radius: 999px;
      background: var(--yellow);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }

    .nav-link:hover::after {
      transform: scaleX(1);
    }
  </style>

  <script>
    (function () {
      document.addEventListener("DOMContentLoaded", () => {
        const menuBtn = document.getElementById("menu-btn");
        const closeBtn = document.getElementById("close-btn");
        const mobileMenu = document.getElementById("mobile-menu");
        const backdrop = document.getElementById("backdrop");
        const mobileLinks = document.querySelectorAll(".mobile-nav");

        const toggleMenu = (show) => {
          if (!mobileMenu || !backdrop) return;
          mobileMenu.classList.toggle("translate-x-full", !show);
          backdrop.classList.toggle("hidden", !show);
          document.body.style.overflow = show ? "hidden" : "";
        };

        if (menuBtn) menuBtn.onclick = () => toggleMenu(true);
        if (closeBtn) closeBtn.onclick = () => toggleMenu(false);
        if (backdrop) backdrop.onclick = () => toggleMenu(false);
        mobileLinks.forEach(link => link.onclick = () => toggleMenu(false));
      });
    })();
  </script>
</nav>
