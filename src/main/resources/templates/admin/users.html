<head th:replace="~{fragments/head :: head}"></head>
<body class="min-h-screen flex bg-gray-100">

  <!-- Sidebar Fragment -->
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>

  <!-- Main -->
  <div class="flex-1 flex flex-col md:ml-64">
    
    <!-- Header -->
    <header class="flex items-center justify-between bg-white shadow px-6 py-4">
      <div class="flex items-center space-x-4">
        <button id="menuBtn" class="md:hidden text-[var(--espresso)] focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <h1 class="text-xl font-bold text-black">User Management</h1>
      </div>
	  
	  <!-- Profile -->
	  <div class="relative group">
	    <button class="flex items-center space-x-3 focus:outline-none">
	      <div class="w-10 h-10 rounded-full bg-[var(--yellow)] flex items-center justify-center font-bold">
	        <span th:text="${firstName.substring(0,1)} + ${lastName.substring(0,1)}">AD</span>
	      </div>
	      <span class="text-gray-700 font-semibold" th:text="${firstName} + ' ' + ${lastName}">Admin Name</span>
	      <svg class="w-4 h-4 text-gray-500 group-hover:text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
	        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
	              d="M19 9l-7 7-7-7"/>
	      </svg>
	    </button>
	    <div class="absolute right-0 mt-2 w-48 bg-white border rounded-lg shadow-lg hidden group-hover:block">
	      <a th:href="@{/admin/profile}" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">My Account</a>
	      <a th:href="@{/admin/settings}" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">Settings</a>
	      <a th:href="@{/logout}" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">Logout</a>
	    </div>
	  </div>
    </header>

    <!-- Content -->
    <main class="p-6">
      
      <!-- Stats -->
      <div class="grid md:grid-cols-4 gap-6 mb-12">
        <div class="bg-white rounded-xl p-6 shadow border">
          <h3 class="text-sm font-bold text-gray-500">Total Users</h3>
          <p class="text-3xl font-bold" th:text="${totalUsers} ?: '--'">0</p>
        </div>
        <div class="bg-white rounded-xl p-6 shadow border">
          <h3 class="text-sm font-bold text-gray-500">Active Users</h3>
          <p class="text-3xl font-bold" th:text="${activeUsers} ?: '--'"></p>
        </div>
        <div class="bg-white rounded-xl p-6 shadow border">
          <h3 class="text-sm font-bold text-gray-500">Suspended Users</h3>
          <p class="text-3xl font-bold" th:text="${suspendedUsers} ?: '--'"></p>
        </div>
        <div class="bg-white rounded-xl p-6 shadow border">
          <h3 class="text-sm font-bold text-gray-500">Admins</h3>
          <p class="text-3xl font-bold" th:text="${adminUsers} ?: '--'"></p>
        </div>
      </div>

      <!-- User Actions -->
      <div class="flex justify-end mb-6">
        <a th:href="@{/admin/users/new}" 
           class="bg-[var(--espresso)] text-white font-bold py-2 px-6 rounded-lg hover:bg-[var(--yellow)] transition">
          + Create User
        </a>
      </div>

      
	  <!-- User Table -->
	  <div class="bg-white rounded-xl shadow border overflow-hidden">
	    <table class="min-w-full divide-y divide-gray-200">
	      <thead class="bg-gray-50">
	        <tr>
	          <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">ID</th>
	          <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Name</th>
			  <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Email</th>
	          <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Role</th> 
	          <th class="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Status</th>
	          <th class="px-6 py-3 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">Actions</th>
	        </tr>
	      </thead>
	      <tbody class="bg-white divide-y divide-gray-200">
	        <tr th:each="user : ${users}" class="hover:bg-gray-50">
	          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900" th:text="${user.id}">1</td>
	          <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" th:text="${user.firstName} + ' ' + ${user.lastName}">Jane Doe</td>
			  <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" th:text="${user.email}">janedoe@email.com</td>
			  
			  
	          <!-- Role Column -->
	          <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
	            <span class="uppercase font-mono text-xs font-bold" th:text="${user.role}">ROLE_CLIENT</span>
	          </td>

	          <td class="px-6 py-4 whitespace-nowrap">
	            <span th:text="${user.status}" 
	                  th:classappend="${user.status.name() == 'ACTIVE' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}"
	                  class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full">
	              ACTIVE
	            </span>
	          </td>

	          <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
	            <!-- Actions -->
	            <div class="flex justify-end space-x-2" th:if="${user.id != currentAdminId}">
	              
	              <!-- Suspend Action -->
	              <form th:action="@{/admin/users/{id}/suspend(id=${user.id})}" method="post" th:if="${user.status.name() == 'ACTIVE'}">
	                <button type="button" onclick="confirmAction(this.form, 'suspend')" class="text-orange-600 hover:text-orange-900 font-bold px-3 py-1 border border-orange-600 rounded-md transition hover:bg-orange-50">
	                  Suspend
	                </button>
	              </form>

	              <!-- Reactivate Action -->
	              <form th:action="@{/admin/users/{id}/reactivate(id=${user.id})}" method="post" th:if="${user.status.name() == 'SUSPENDED'}">
	                <button type="button" onclick="confirmAction(this.form, 'reactivate')" class="text-green-600 hover:text-green-900 font-bold px-3 py-1 border border-green-600 rounded-md transition hover:bg-green-50">
	                  Reactivate
	                </button>
	              </form>

	              <!-- Delete Action -->
	              <form th:action="@{/admin/users/{id}/delete(id=${user.id})}" method="post" onsubmit="return confirm('Delete this user?');">
	                <button type="button" onclick="confirmAction(this.form, 'delete')" class="text-red-600 hover:text-red-900 font-bold px-3 py-1 border border-red-600 rounded-md transition hover:bg-red-50">
	                  Delete
	                </button>
	              </form>
	            </div>

	            <!--Self -->
	            <span th:if="${user.id == currentAdminId}" class="text-gray-400 italic text-xs">
	              (You)
	            </span>
	          </td>
	        </tr>
	      </tbody>
	    </table>
	  </div>
    </main>
  </div>
  
  <!-- Confirmation Modal -->
  <div id="confirmModal" class="fixed inset-0 z-50 hidden overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:block sm:p-0">
      <div class="fixed inset-0 transition-opacity bg-gray-500 bg-opacity-75" aria-hidden="true" onclick="closeModal()"></div>
      <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
      <div class="inline-block overflow-hidden text-left align-bottom transition-all transform bg-white rounded-lg shadow-xl sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
        <div class="px-4 pt-5 pb-4 bg-white sm:p-6 sm:pb-4">
          <div class="sm:flex sm:items-start">
            <div id="modalIcon" class="flex items-center justify-center flex-shrink-0 w-12 h-12 mx-auto rounded-full sm:mx-0 sm:h-10 sm:w-10">
              
            </div>
            <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
              <h3 class="text-lg font-medium leading-6 text-gray-900" id="modalTitle">Confirm Action</h3>
              <div class="mt-2"><p class="text-sm text-gray-500" id="modalMessage"></p></div>
            </div>
          </div>
        </div>
        <div class="px-4 py-3 bg-gray-50 sm:px-6 sm:flex sm:flex-row-reverse">
          <button type="button" id="confirmBtn" class="inline-flex justify-center w-full px-4 py-2 text-base font-medium text-white border border-transparent rounded-md shadow-sm sm:ml-3 sm:w-auto"></button>
          <button type="button" onclick="closeModal()" class="mt-3 inline-flex justify-center w-full px-4 py-2 text-base font-medium text-gray-700 bg-white border border-gray-300 rounded-md shadow-sm hover:bg-gray-50 sm:mt-0 sm:w-auto">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script>

      window.activeForm = null;

      function confirmAction(form, type) {
          window.activeForm = form;
          const modal = document.getElementById('confirmModal');
          const title = document.getElementById('modalTitle');
          const message = document.getElementById('modalMessage');
          const btn = document.getElementById('confirmBtn');
          const icon = document.getElementById('modalIcon');

          if (type === 'delete') {
              title.innerText = 'Delete User';
              message.innerText = 'Are you sure you want to permanently delete this user? This action cannot be undone.';
              btn.innerText = 'Delete';
              btn.className = 'inline-flex justify-center w-full px-4 py-2 text-base font-medium text-white bg-red-600 rounded-md shadow-sm hover:bg-red-700 sm:ml-3 sm:w-auto';
              icon.innerHTML = '<svg class="h-6 w-6 text-red-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>';
              icon.className = 'flex items-center justify-center flex-shrink-0 w-12 h-12 mx-auto bg-red-100 rounded-full sm:mx-0 sm:h-10 sm:w-10';
          } else if (type === 'reactivate') {
              title.innerText = 'Reactivate User';
              message.innerText = 'This will restore the user\'s access to the system immediately.';
              btn.innerText = 'Reactivate';
              btn.className = 'inline-flex justify-center w-full px-4 py-2 text-base font-medium text-white bg-green-600 rounded-md shadow-sm hover:bg-green-700 sm:ml-3 sm:w-auto';
              icon.innerHTML = '<svg class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>';
              icon.className = 'flex items-center justify-center flex-shrink-0 w-12 h-12 mx-auto bg-green-100 rounded-full sm:mx-0 sm:h-10 sm:w-10';
          } else {
              title.innerText = 'Suspend User';
              message.innerText = 'This will prevent the user from logging in until they are reactivated.';
              btn.innerText = 'Suspend';
              btn.className = 'inline-flex justify-center w-full px-4 py-2 text-base font-medium text-white bg-orange-600 rounded-md shadow-sm hover:bg-orange-700 sm:ml-3 sm:w-auto';
              icon.innerHTML = '<svg class="h-6 w-6 text-orange-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>';
              icon.className = 'flex items-center justify-center flex-shrink-0 w-12 h-12 mx-auto bg-orange-100 rounded-full sm:mx-0 sm:h-10 sm:w-10';
          }

          modal.classList.remove('hidden');
          
          btn.onclick = function() {
              if (window.activeForm) {
                  window.activeForm.submit();
              }
          };
      }

      function closeModal() {
          const modal = document.getElementById('confirmModal');
          modal.classList.add('hidden');
          window.activeForm = null; 
      } 
  </script>

</body>
