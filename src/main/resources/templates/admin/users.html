<head th:replace="~{fragments/head :: head}"></head>
<body class="min-h-screen flex bg-gray-100">

  <!-- Sidebar Fragment -->
  <div th:replace="~{fragments/sidebar :: sidebar}"></div>

  <!-- Main -->
  <div class="flex-1 flex flex-col md:ml-64">
    
    <!-- Header -->
    <header class="flex items-center justify-between bg-white shadow px-6 py-4">
      <div class="flex items-center space-x-4">
        <button id="menuBtn" class="md:hidden text-[var(--espresso)] focus:outline-none">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <h1 class="text-xl font-bold text-black">User Management</h1>
      </div>
	  
	  <!-- Profile -->
	  <div class="relative group">
	    <button class="flex items-center space-x-3 focus:outline-none">
	      <div class="w-10 h-10 rounded-full bg-[var(--yellow)] flex items-center justify-center font-bold">
	        <span th:text="${firstName.substring(0,1)} + ${lastName.substring(0,1)}">AD</span>
	      </div>
	      <span class="text-gray-700 font-semibold" th:text="${firstName} + ' ' + ${lastName}">Admin Name</span>
	      <svg class="w-4 h-4 text-gray-500 group-hover:text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
	        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
	              d="M19 9l-7 7-7-7"/>
	      </svg>
	    </button>
	    <div class="absolute right-0 mt-2 w-48 bg-white border rounded-lg shadow-lg hidden group-hover:block">
	      <a th:href="@{/admin/profile}" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">My Account</a>
	      <a th:href="@{/admin/settings}" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">Settings</a>
	      <a th:href="@{/logout}" class="block px-4 py-2 text-gray-700 hover:bg-gray-100">Logout</a>
	    </div>
	  </div>
    </header>

    <!-- Content -->
    <main class="p-6">
      
      <!-- Stats -->
      <div class="grid md:grid-cols-4 gap-6 mb-12">
        <div class="bg-white rounded-xl p-6 shadow border">
          <h3 class="text-sm font-bold text-gray-500">Total Users</h3>
          <p class="text-3xl font-bold" th:text="${totalUsers} ?: '--'">0</p>
        </div>
        <div class="bg-white rounded-xl p-6 shadow border">
          <h3 class="text-sm font-bold text-gray-500">Active Users</h3>
          <p class="text-3xl font-bold" th:text="${activeUsers} ?: '--'"></p>
        </div>
        <div class="bg-white rounded-xl p-6 shadow border">
          <h3 class="text-sm font-bold text-gray-500">Suspended Users</h3>
          <p class="text-3xl font-bold" th:text="${suspendedUsers} ?: '--'"></p>
        </div>
        <div class="bg-white rounded-xl p-6 shadow border">
          <h3 class="text-sm font-bold text-gray-500">Admins</h3>
          <p class="text-3xl font-bold" th:text="${adminUsers} ?: '--'"></p>
        </div>
      </div>

      <!-- User Actions -->
      <div class="flex justify-end mb-6">
        <a th:href="@{/admin/users/new}" 
           class="bg-[var(--espresso)] text-white font-bold py-2 px-6 rounded-lg hover:bg-[var(--yellow)] transition">
          + Create User
        </a>
      </div>

      <!-- User Table -->
      <div class="bg-white rounded-xl shadow border overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Role</th>
              <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
              <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Actions</th>
            </tr>
          </thead>
          <tbody class="bg-white divide-y divide-gray-200">
            <tr th:each="user : ${users}">
              <td class="px-6 py-4 whitespace-nowrap" th:text="${user.firstName} + ' ' + ${user.lastName}">John Doe</td>
              <td class="px-6 py-4 whitespace-nowrap" th:text="${user.email}">john@example.com</td>
              <td class="px-6 py-4 whitespace-nowrap" th:text="${user.role}">USER</td>
              <td class="px-6 py-4 whitespace-nowrap">
                <span th:text="${user.active} ? 'Active' : 'Suspended'"
                      th:classappend="${user.active} ? ' text-green-600' : ' text-red-600'">Active</span>
              </td>
              <td class="px-6 py-4 whitespace-nowrap text-right space-x-2">
                <a th:href="@{'/admin/users/' + ${user.id} + '/suspend'}"
                   class="bg-[var(--yellow)] text-black px-3 py-1 rounded hover:bg-[var(--espresso)] hover:text-white transition">
                  Suspend
                </a>
                <a th:href="@{'/admin/users/' + ${user.id} + '/delete'}"
                   class="bg-red-600 text-white px-3 py-1 rounded hover:bg-red-800 transition">
                  Delete
                </a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>
</body>
