<head th:replace="~{fragments/head :: head}"></head>


<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 border-t-4 border-red-600 text-center">
    <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
      <svg class="w-10 h-10 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
    </div>
    
    <h1 class="text-2xl font-bold text-gray-900 mb-2">Account Restricted</h1>
    <p class="text-gray-600 mb-8">
      Your account has been suspended. <br/> You cannot access the system at this time.
    </p>

    <div class="bg-gray-50 p-4 rounded-lg mb-6 text-left">
      <h3 class="text-sm font-bold text-gray-700 uppercase mb-2">How to reactivate:</h3>
      <p class="text-sm text-gray-600">Please send a formal appeal to the  team explaining your request for reinstatement.</p>
    </div>

    <!-- Reactivation Petition Link gmail -->
	<a href="https://mail.google.com/mail/?view=cm&fs=1&to=mmesomaalagwu@gmail.com&su=Account%20Reactivation&body=Hello%20Admin,%0D%0A%0D%0AMy%20account%20has%20been%20suspended%20and%20I%20would%20like%20to%20request%20reactivation.%0D%0A%0D%0AReason%20for%20appeal:%0D%0A[Enter%20your%20reason%20here]"
	   target="_blank" rel="noopener noreferrer" class="block w-full py-3 bg-red-600 text-white font-bold rounded-lg hover:bg-red-700 transition">
	   Request Reactivation via Gmail
	</a>

	<br>
	<!-- Other mail apps fallback -->
	<a href="mailto:admin@://yourquizapp.com account is suspended..." 
	   class="text-sm text-gray-500 underline">
	  Use other mail appss
	</a>
    
    <a th:href="@{/logout}" class="block w-full py-3 bg-gray-200 text-gray-700 font-bold rounded-lg hover:bg-gray-300 transition">
      Logout
    </a>
  </div>
</body>
