<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head"></head>
<body class="min-h-screen flex flex-col">
<div th:replace="fragments/navbar :: navbar"></div>

<main class="flex-grow flex items-center justify-center px-6 pt-6 pb-12">
  <div class="grid gap-8 max-w-2xl w-full md:grid-cols-2 items-center">
    <!-- Game Image Left -->
    <div class="hidden md:flex items-center justify-center" data-aos="fade-right">
      <div class="relative">
        <div class="absolute -inset-2 bg-gradient-to-r from-[var(--light-brown)] to-[var(--espresso)] rounded-[2rem] opacity-20 blur-xl"></div>
        <div class="relative bg-white rounded-[2rem] p-8 border-2 border-[var(--espresso)]">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-32 h-32 text-[var(--espresso)] mx-auto" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm0-13c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5z"/>
          </svg>
          <p class="text-center text-sm font-bold text-[var(--espresso)] mt-4">Set New Password!</p>
        </div>
      </div>
    </div>

    <!-- Reset Password Form Right -->
    <div class="bg-white rounded-2xl p-8 md:p-10 border-2 border-r-8 border-b-8 border-[var(--espresso)] shadow-sm transition-all hover:-translate-y-1 active:translate-y-0.5 active:border-b-4 active:border-r-4" data-aos="zoom-in">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-[var(--espresso)]">Set a New Password</h1>
      <p class="text-gray-500 mt-2">Choose a secure password so you can log back into JavaJolt.</p>
    </div>

    <div th:if="${error}" class="mb-6 rounded-xl bg-red-50 border border-red-200 p-4 text-sm text-red-700">
      <p th:text="${error}"></p>
    </div>

    <form th:action="@{/auth/reset-password}" method="POST" class="space-y-5">
      <div>
        <label class="block text-sm font-bold text-[var(--espresso)] mb-1.5">New Password</label>
        <div class="relative">
          <input type="password" name="password" placeholder="Enter new password" required
                 class="w-full px-4 py-3 rounded-xl border-2 border-[var(--espresso)] focus:ring-0 outline-none transition-all text-black pr-12">
          <button type="button" class="password-toggle-btn absolute right-4 top-3 text-[var(--espresso)] hover:text-[var(--light-brown)]">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
          </button>
        </div>
      </div>

      <div>
        <label class="block text-sm font-bold text-[var(--espresso)] mb-1.5">Confirm Password</label>
        <div class="relative">
          <input type="password" name="confirmPassword" placeholder="Repeat password" required
                 class="w-full px-4 py-3 rounded-xl border-2 border-[var(--espresso)] focus:ring-0 outline-none transition-all text-black pr-12">
          <button type="button" class="password-toggle-btn absolute right-4 top-3 text-[var(--espresso)] hover:text-[var(--light-brown)]">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="w-full bg-[var(--espresso)] text-white font-bold py-4 rounded-xl border-b-4 border-[#352521] shadow-lg hover:brightness-110 active:border-b-0 active:translate-y-1 transition-all mt-2">
        Save Password
      </button>
    </form>
  </div>
</main>

<div th:replace="fragments/footer :: footer"></div>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>AOS.init({ once: true, duration: 600 });</script>
</body>
</html>
