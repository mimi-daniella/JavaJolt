<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head"></head>

<body class="min-h-screen flex flex-col">
	<div th:replace="fragments/navbar :: navbar"></div>

	<main class="flex-grow flex items-center justify-center px-6 pt-6 pb-12">

		<div class="bg-white rounded-2xl p-8 md:p-10 border-2 border-r-8 border-b-8 border-[var(--espresso)] shadow-sm transition-all hover:-translate-y-1 active:translate-y-0.5 active:border-b-4 active:border-r-4"
			data-aos="zoom-in">
			<div class="text-center mb-8">
				<h1 class="text-3xl font-bold ">Set a New Password</h1>
				<p class="text-gray-500 mt-2">Choose a secure password so you can log back into JavaJolt.</p>
			</div>

			<div th:if="${error}" class="mb-6 rounded-xl bg-red-50 border border-red-200 p-4 text-sm text-red-700">
				<p th:text="${error}"></p>
			</div>

			<form th:action="@{/auth/reset-password}" method="POST" class="space-y-5">
				<div>
					<label class="block text-sm font-bold mb-1.5">New Password</label>
					<div class="relative">
						<input type="password" name="password" placeholder="Enter new password" required
							class="w-full px-4 py-3 rounded-xl border-2 border-[var(--espresso)] focus:ring-0 outline-none transition-all text-black pr-12">
						<button type="button"
							class="password-toggle-btn absolute right-4 top-3 text-[var(--espresso)] hover:text-[var(--light-brown)]">
							<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
								stroke="currentColor" class="size-6">
								<path stroke-linecap="round" stroke-linejoin="round"
									d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
							</svg>
						</button>
					</div>
				</div>

				<div>
					<label class="block text-sm font-bold mb-1.5">Confirm Password</label>
					<div class="relative">
						<input type="password" name="confirmPassword" placeholder="Repeat password" required
							class="w-full px-4 py-3 rounded-xl border-2 border-[var(--espresso)] focus:ring-0 outline-none transition-all text-black pr-12">
						<button type="button"
							class="password-toggle-btn absolute right-4 top-3 text-[var(--espresso)] hover:text-[var(--light-brown)]">
							<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5"
								stroke="currentColor" class="size-6">
								<path stroke-linecap="round" stroke-linejoin="round"
									d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
							</svg>
						</button>
					</div>
				</div>

				<button type="submit"
					class="w-full bg-[var(--espresso)] text-white font-bold py-4 rounded-xl border-b-4 border-[#352521] shadow-lg hover:brightness-110 active:border-b-0 active:translate-y-1 transition-all mt-2">
					Save Password
				</button>
			</form>
		</div>
	</main>

	<div th:replace="fragments/footer :: footer"></div>
	<script th:src="@{/js/password-toggle.js}"></script>
	<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
	<script>AOS.init({once: true, duration: 600});</script>
</body>

</html>
