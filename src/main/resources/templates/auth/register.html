
<html>
<head th:replace="~{fragments/head :: head}"></head>
<body>
  <div th:replace="~{fragments/navbar :: navbar}"></div>

  <main class="flex-grow flex items-center justify-center px-6 pt-6 pb-12">
    <!-- Main Card -->
    <div class="bg-white max-w-md w-full rounded-2xl shadow-sm border border-gray-200 p-8 md:p-10" data-aos="fade-up">
      
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-[var(--espresso)]">Create Account</h1>
        <p class="text-gray-500 mt-2">Join the JavaJolt community today.</p>
      </div>

      <!-- Social Register -->
      <div class="mb-6">
        <a th:href="@{/oauth2/authorization/google}" 
           class="flex items-center justify-center gap-3 w-full py-3 px-4 border border-gray-300 rounded-xl hover:bg-gray-50 transition-colors text-gray-700 font-medium">
          <img src="https://gstatic.com" class="w-5 h-5" alt="Google">
          Sign up with Google
        </a>
      </div>

      <div class="relative flex items-center mb-6">
        <div class="flex-grow border-t border-gray-200"></div>
        <span class="flex-shrink mx-4 text-gray-400 text-sm uppercase tracking-wider">or</span>
        <div class="flex-grow border-t border-gray-200"></div>
      </div>

      <!-- Registration Form -->
      <form th:action="@{/auth/register}" method="POST" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-[var(--espresso)] mb-1.5">Username</label>
          <input type="text" name="username" placeholder="Enter username" 
                 class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-[var(--light-brown)] focus:ring-1 focus:ring-[var(--light-brown)] outline-none transition-all text-black" required>
        </div>

        <div>
          <label class="block text-sm font-semibold text-[var(--espresso)] mb-1.5">Email Address</label>
          <input type="email" name="email" placeholder="name@example.com" 
                 class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-[var(--light-brown)] focus:ring-1 focus:ring-[var(--light-brown)] outline-none transition-all text-black" required>
        </div>

        <div>
          <label class="block text-sm font-semibold text-[var(--espresso)] mb-1.5">Password</label>
          <input type="password" name="password" placeholder="Create a password" 
                 class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:border-[var(--light-brown)] focus:ring-1 focus:ring-[var(--light-brown)] outline-none transition-all text-black" required>
        </div>

        <button type="submit" 
                class="w-full bg-[var(--espresso)] text-white font-bold py-3.5 rounded-xl shadow-md hover:brightness-110 transition-all mt-2">
          Create Account
        </button>
      </form>

      <p class="mt-8 text-center text-sm text-gray-600">
        Already have an account? 
        <!-- Fixed: th:href now uses valid @{} syntax -->
        <a th:href="@{/auth/login}" class="text-[var(--light-brown)] font-bold hover:underline">Log in</a>
      </p>
    </div>
  </main>

 <div th:replace="fragments/footer :: footer"></div>

  <script src="https://unpkg.com"></script>
  <script>
    AOS.init({ once: true, duration: 800 });
  </script>
</body>
</html>
