<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head th:replace="~{fragments/head :: head}"></head>


<body class="min-h-screen relative">
	<!-- Background image -->
	<div class="absolute inset-0 bg-cover bg-center bg-no-repeat"
		th:style="'background-image: url(' + @{/images/signupbg.jpeg} + ')'"></div>
	<!-- Gradient overlay -->
	<div class="absolute inset-0 bg-gradient-to-br from-black/40 to-[var(--espresso)]/40"></div>


	<main class="flex-grow flex items-center justify-center px-6 pt-6 pb-12">
		<div class="max-w-md w-full">
			<!-- Register Form -->
			<div class="bg-white rounded-2xl p-8 md:p-10 border-2 border-r-8 border-b-8 border-[var(--espresso)] shadow-sm transition-all hover:-translate-y-1 active:translate-y-0.5 active:border-b-4 active:border-r-4"
				data-aos="zoom-in">

				<div class="text-center mb-8">
					<h1 class="text-3xl font-bold text-[var(--espresso)]">Create Account</h1>
					<p class="text-gray-500 mt-2">Join the JavaJolt community today.</p>
				</div>

				<div th:if="${error}" class="mb-6 rounded-xl bg-red-50 border border-red-200 p-4 text-sm text-red-700">
					<p th:text="${error}"></p>
				</div>

				<!-- Google Sign Up -->
				<div class="mb-6">
					<a th:href="@{/oauth2/authorization/google}" target="_blank" rel="noopener noreferrer"
						class="flex items-center justify-center gap-3 w-full py-3 px-4 border-2 border-[var(--espresso)] rounded-xl hover:bg-gray-50 transition-colors text-[var(--espresso)] font-bold shadow-[4px_4px_0px_var(--espresso)] active:shadow-none active:translate-x-1 active:translate-y-1">
						<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" viewBox="0 0 24 24" fill="currentColor">
							<path
								d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
								fill="#4285F4" />
							<path
								d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
								fill="#34A853" />
							<path
								d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
								fill="#FBBC05" />
							<path
								d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
								fill="#EA4335" />
						</svg>
						Sign up with Google
					</a>
				</div>

				<div class="relative flex items-center mb-6">
					<div class="flex-grow border-t-2 border-gray-100"></div>
					<span class="flex-shrink mx-4 text-gray-400 text-xs font-bold uppercase tracking-widest">OR</span>
					<div class="flex-grow border-t-2 border-gray-100"></div>
				</div>

				<!-- Registration Form -->
				<form th:action="@{/auth/register}" method="POST" class="space-y-5">
					<div class="grid gap-4 md:grid-cols-2">
						<div>
							<label class="block text-sm font-bold text-[var(--espresso)] mb-1.5">First Name</label>
							<input type="text" name="firstName" placeholder="First name"
								class="w-full px-4 py-3 rounded-xl border-2 border-[var(--espresso)] focus:ring-0 outline-none transition-all text-black"
								required>
						</div>
						<div>
							<label class="block text-sm font-bold text-[var(--espresso)] mb-1.5">Last Name</label>
							<input type="text" name="lastName" placeholder="Last name"
								class="w-full px-4 py-3 rounded-xl border-2 border-[var(--espresso)] focus:ring-0 outline-none transition-all text-black"
								required>
						</div>
					</div>

					<div>
						<label class="block text-sm font-bold text-[var(--espresso)] mb-1.5">Email Address</label>
						<input type="email" name="email" placeholder="name@example.com"
							class="w-full px-4 py-3 rounded-xl border-2 border-[var(--espresso)] focus:ring-0 outline-none transition-all text-black"
							required>
					</div>

					<div>
						<label class="block text-sm font-bold text-[var(--espresso)] mb-1.5">Password</label>
						<div class="relative">
							<input type="password" name="password" placeholder="Create a password" id="password"
								class="w-full px-4 py-3 rounded-xl border-2 border-[var(--espresso)] focus:ring-0 outline-none transition-all text-black pr-12"
								required>
							<button type="button"
								class="password-toggle-btn absolute right-4 top-3 text-[var(--espresso)] hover:text-[var(--light-brown)]">
								<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
									stroke-width="1.5" stroke="currentColor" class="size-6">
									<path stroke-linecap="round" stroke-linejoin="round"
										d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
								</svg>


							</button>
						</div>
					</div>

					<div>
						<label class="block text-sm font-bold text-[var(--espresso)] mb-1.5">Confirm Password</label>
						<div class="relative">
							<input type="password" name="confirmPassword" placeholder="Confirm password" id="confirmPassword"
								class="w-full px-4 py-3 rounded-xl border-2 border-[var(--espresso)] focus:ring-0 outline-none transition-all text-black pr-12"
								required>
							<button type="button"
								class="password-toggle-btn absolute right-4 top-3 text-[var(--espresso)] hover:text-[var(--light-brown)]">
								<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
									stroke-width="1.5" stroke="currentColor" class="size-6">
									<path stroke-linecap="round" stroke-linejoin="round"
										d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
								</svg>

							</button>
						</div>
					</div>

					<button type="submit"
						class="w-full bg-[var(--espresso)] text-white font-bold py-4 rounded-xl border-b-4 border-[#352521] shadow-lg hover:brightness-110 active:border-b-0 active:translate-y-1 transition-all mt-2">
						Create Account
					</button>
				</form>

				<p class="mt-8 text-center text-sm text-gray-600">
					Already have an account?
					<a th:href="@{/auth/login}" class="text-[var(--light-brown)] font-bold hover:underline">Log in</a>
				</p>
			</div>
		</div>
	</main>

	
	<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/js-cookie@3/dist/js.cookie.min.js"></script>
	<script th:src="@{/js/password-toggle.js}"></script>
	<script>
		AOS.init({once: true, duration: 800});
	</script>
</body>

</html>
