<html>
<head th:replace="~{fragments/head :: head}"></head>
<body>

  <!-- Navbar -->
  <div th:replace="~{fragments/navbar :: navbar}"></div>
  <!-- Back to Top -->
  <div th:replace="~{fragments/backToTop :: backToTop}"></div>

  <!-- Hero -->
  <section class="flex flex-col items-center justify-center min-h-[40vh] px-6 text-center"
           data-aos="fade-up">
    <h1 class="text-5xl md:text-6xl font-bold kavoon text-[var(--espresso)] mb-4 drop-shadow-md">
      Contact Support
    </h1>
    <p class="text-lg md:text-xl max-w-2xl">
      Need help, feedback, or just want to say hi? Our friendly assistant <strong>Daniella</strong> is here to listen.
    </p>
    <div th:if="${loggedIn}" class="mt-6 flex flex-wrap justify-center gap-4">
      <a th:href="@{/dashboard}" class="rounded-xl border-4 border-[var(--espresso)] bg-[var(--yellow)] px-5 py-3 font-bold text-[var(--espresso)] shadow-[4px_4px_0px_var(--espresso)] transition hover:translate-y-1 hover:shadow-none">
        Back to Dashboard
      </a>
      <a th:href="@{/quizzes}" class="rounded-xl border-4 border-[var(--espresso)] bg-white px-5 py-3 font-bold text-[var(--espresso)] shadow-[4px_4px_0px_var(--yellow)] transition hover:translate-y-1 hover:shadow-none">
        Open Quizzes
      </a>
    </div>
  </section>

  <!-- Split Layout -->
  <section class="px-6 md:px-20 bg-[var(--cream)]">
    <div th:if="${success}" class="mb-8 rounded-xl border-4 border-[var(--espresso)] bg-[#fff5cd] px-5 py-4 font-bold text-[var(--espresso)] shadow-[4px_4px_0px_var(--yellow)]" th:text="${success}"></div>
    <div th:if="${preview}" class="mb-8 rounded-xl border-4 border-[var(--espresso)] bg-white px-5 py-4 text-[var(--espresso)] shadow-[4px_4px_0px_var(--light-brown)]">
      Message preview: <span th:text="${preview}"></span>
    </div>
    <div class="grid md:grid-cols-2 gap-12 items-start">

      <!-- Contact Info Bubble -->
      <div class="p-8 bg-white border-2 border-black border-dashed rounded-xl shadow-lg relative"
           data-aos="fade-right">
        <h2 class="text-3xl font-bold mb-6">Reach Us</h2>
        <ul class="space-y-4 text-lg">
          <li><span class="font-bold">Email:</span> 
              <a href="mailto:support@javajolt.com" class="">support@javajolt.com</a></li>
          <li><span class="font-bold">Twitter:</span> 
              <a href="https://twitter.com/javajolt" class="">@javajolt</a></li>
          <li><span class="font-bold">Instagram:</span> 
              <a href="https://instagram.com/javajolt" class="">@javajolt</a></li>
          <li><span class="font-bold">Phone:</span> +234‑800‑JAVA‑JOLT</li>
        </ul>
        <!-- Comic bubble tail -->
        <div class="absolute -bottom-6 left-6 w-0 h-0 border-l-[20px] border-r-[20px] border-t-[20px] border-l-transparent border-r-transparent border-t-[var(--espresso)]"></div>
      </div>

      <!-- Feedback Form Speech tail-->
      <div class="p-2 px-6 border-2 border-black border-dashed rounded-xl shadow-lg relative "
           data-aos="fade-left">
        <h2 class="text-3xl font-bold mb-6">Send Feedback</h2>
        <form th:action="@{/public/contact}" method="post" class="space-y-1"> 
          <div>
            <label class="block font-semibold mb-2">Your Email</label>
            <input type="email" name="email" class="w-full px-4 py-2 border-2 rounded-lg focus:outline-none focus:border-[var(--espresso)]" required>
          </div>
          <div>
            <label class="block font-semibold  mb-2">Message</label>
            <textarea name="message" rows="5" class="w-full px-4 py-2 border-2  rounded-lg focus:outline-none focus:border-[var(--espresso)]" required></textarea>
          </div>
          <div class="text-center">
            <button type="submit"
                    class="bg-[var(--espresso)] text-white px-6 py-3 rounded-lg shadow-lg hover:bg-[var(--light-brown)] transition">
              Submit
            </button>
          </div>
        </form>
        <!-- Speech tail -->
        <div class="absolute -bottom-6 right-10 w-0 h-0 border-l-[20px] border-r-[20px] border-t-[20px] border-l-transparent border-r-transparent border-t-[var(--espresso)]"></div>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <div th:replace="~{fragments/footer :: footer}"></div>

  <!-- AOS Script -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({ once: true, duration: 1000, easing: 'ease-out' });
  </script>
</body>
</html>
